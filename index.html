<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0057d8">
  <title>ナンプレ工場 Ver1.1</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Sudoku Factory Ver1.1</p>
        <h1>ナンプレ工場</h1>
      </div>
      <div class="status-badge" id="selectedStatus">new</div>
    </header>

    <section class="home-panel" aria-label="進捗と問題選択">
      <div id="progressSummary" class="progress-summary"></div>
      <div class="pickers">
        <label>
          <span>Difficulty</span>
          <select id="difficultySelect" aria-label="難易度を選ぶ"></select>
        </label>
        <label>
          <span>Puzzle</span>
          <select id="puzzleNumberSelect" aria-label="問題番号を選ぶ"></select>
        </label>
      </div>
    </section>

    <section class="status-panel" aria-live="polite">
      <p id="message">問題を選んで開始</p>
    </section>

    <section class="board-wrap" aria-label="ナンプレ盤面">
      <div id="board" class="board" role="grid" aria-label="9x9 Sudoku board"></div>
    </section>

    <section class="controls" aria-label="入力">
      <div id="numberPad" class="number-pad" aria-label="数字ボタン"></div>
      <button id="clearCell" class="secondary" type="button">消す</button>
    </section>

    <section class="actions" aria-label="操作">
      <button id="checkMistakes" type="button">ミス確認</button>
      <button id="checkComplete" type="button">完成確認</button>
      <button id="hintOne" type="button">ヒント</button>
      <button id="resetPuzzle" class="danger" type="button">現在リセット</button>
      <button id="resetAllProgress" class="danger" type="button">全リセット</button>
      <button id="continuePuzzle" type="button">続きから</button>
    </section>
  </main>

  <script src="puzzles.js"></script>
  <script src="app.js"></script>
</body>
</html>
