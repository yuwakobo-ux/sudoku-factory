<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#245b54">
  <title>ナンプレ工場 Ver.0.4</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Sudoku Factory Ver.0.4</p>
        <h1>ナンプレ工場</h1>
      </div>
      <label class="selector">
        <span>問題</span>
        <select id="puzzleSelect" aria-label="問題を選ぶ"></select>
      </label>
    </header>

    <section class="status-panel" aria-live="polite">
      <p id="message">マスを選んで入力</p>
    </section>

    <section class="board-wrap" aria-label="ナンプレ盤面">
      <div id="board" class="board" role="grid" aria-label="9x9 Sudoku board"></div>
    </section>

    <section class="controls" aria-label="入力">
      <div id="numberPad" class="number-pad" aria-label="数字ボタン"></div>
      <button id="clearCell" class="secondary" type="button">消す</button>
    </section>

    <section class="actions" aria-label="確認とヒント">
      <button id="checkMistakes" type="button">ミス確認</button>
      <button id="checkComplete" type="button">完成確認</button>
      <button id="hintOne" type="button">ヒント1</button>
      <button id="hintTwo" type="button">ヒント2</button>
      <button id="hintThree" type="button">ヒント3</button>
      <button id="resetPuzzle" class="danger" type="button">リセット</button>
    </section>
  </main>

  <script src="puzzles.js"></script>
  <script src="app.js"></script>
</body>
</html>
